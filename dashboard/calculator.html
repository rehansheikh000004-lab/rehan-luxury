<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>REHAN Calculator</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="calculator.css">
</head>
<body>

<div class="bg-glow"></div>

<!-- NAVBAR -->

<header class="navbar">

  <a href="index.html" class="back-btn">
    ← Dashboard
  </a>

  <h1>Luxury Calculator</h1>

</header>

<!-- CALCULATOR -->

<section class="calculator-container">

  <div class="calculator">

    <input
      type="text"
      id="display"
      readonly
    >

    <div class="buttons">

      <button onclick="clearDisplay()" class="special">
        AC
      </button>

      <button onclick="deleteLast()" class="special">
        DEL
      </button>

      <button onclick="appendValue('%')" class="special">
        %
      </button>

      <button onclick="appendValue('/')" class="operator">
        ÷
      </button>

      <button onclick="appendValue('7')">7</button>
      <button onclick="appendValue('8')">8</button>
      <button onclick="appendValue('9')">9</button>

      <button onclick="appendValue('*')" class="operator">
        ×
      </button>

      <button onclick="appendValue('4')">4</button>
      <button onclick="appendValue('5')">5</button>
      <button onclick="appendValue('6')">6</button>

      <button onclick="appendValue('-')" class="operator">
        −
      </button>

      <button onclick="appendValue('1')">1</button>
      <button onclick="appendValue('2')">2</button>
      <button onclick="appendValue('3')">3</button>

      <button onclick="appendValue('+')" class="operator">
        +
      </button>

      <button onclick="appendValue('0')" class="zero">
        0
      </button>

      <button onclick="appendValue('.')">
        .
      </button>

      <button onclick="calculate()" class="equal">
        =
      </button>

    </div>

  </div>

</section>

<script src="calculator.js"></script>
</body>
</html>
